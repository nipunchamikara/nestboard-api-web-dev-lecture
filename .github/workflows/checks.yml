name: Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
